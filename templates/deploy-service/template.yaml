apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: deploy-service
  title: Deploy Service
  description: |
    Deploy a new version of a microservice to the Kind cluster by patching the
    HelmRelease image tag. Flux will automatically reconcile the change.
  tags:
    - deploy
    - gitops
    - flux
spec:
  owner: platform-team
  type: deployment

  parameters:
    - title: Service to Deploy
      required:
        - serviceName
        - imageTag
      properties:
        serviceName:
          title: Service Name
          type: string
          description: The microservice to deploy
          enum:
            - auth
            - user
            - product
            - cart
            - order
            - review
            - notification
            - shipping
            - frontend
          enumNames:
            - Auth Service
            - User Service
            - Product Service
            - Cart Service
            - Order Service
            - Review Service
            - Notification Service
            - Shipping Service
            - Frontend
        imageTag:
          title: Image Tag
          type: string
          description: "The image tag to deploy (e.g. v1.2.3, latest, sha-abc123)"
          ui:autofocus: true

  steps:
    - id: log-deploy-info
      name: Deployment summary
      action: debug:log
      input:
        message: |
          Deploying ${{ parameters.serviceName }} with image tag ${{ parameters.imageTag }}

    - id: log-deploy-command
      name: kubectl patch command
      action: debug:log
      input:
        message: >-
          kubectl -n ${{ parameters.serviceName }} patch helmrelease ${{ parameters.serviceName }}
          --type merge -p '{"spec":{"values":{"image":{"tag":"${{ parameters.imageTag }}"}}}}'

  output:
    links:
      - title: View Service in Catalog
        icon: catalog
        entityRef: component:default/${{ parameters.serviceName }}
    text:
      - title: Deploy Command
        content: |
          Run this to deploy **${{ parameters.serviceName }}** to **${{ parameters.imageTag }}**:

          ```
          kubectl -n ${{ parameters.serviceName }} patch helmrelease ${{ parameters.serviceName }} \
            --type merge -p '{"spec":{"values":{"image":{"tag":"${{ parameters.imageTag }}"}}}}'
          ```
