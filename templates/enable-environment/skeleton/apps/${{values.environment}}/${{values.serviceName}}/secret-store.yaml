# Per-service SecretStore (ESO fake provider on Kind). Real clusters use a
# shared ClusterSecretStore → Vault instead.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: ${{ values.serviceName }}-fake
  namespace: ${{ values.serviceName }}-${{ values.environment }}
spec:
  provider:
    fake:
      data:
        - key: ${{ values.serviceName }}/${{ values.environment }}/app-secret
          value: "${{ values.environment }}-demo-secret-CHANGEME"
