# ${{ values.environment }} — per-environment desired state for ${{ values.serviceName }}.
replicaCount: ${{ values.replicas }}

image:
  tag: ${{ values.imageTag | dump }} # {"$imagepolicy": "flux-system:${{ values.serviceName }}-${{ values.environment }}:tag"}

env:
  - name: SERVICE_NAME
    value: "${{ values.serviceName }}"
  - name: PORT
    value: "8080"
  - name: VERSION
    value: ${{ values.imageTag | dump }}
  - name: ENV
    value: "${{ values.appEnv }}"
  - name: LOG_LEVEL
    value: "${{ values.logLevel }}"
  - name: LOG_FORMAT
    value: "json"
  - name: TRACING_ENABLED
    value: "false"
  - name: OTEL_COLLECTOR_ENDPOINT
    value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
  - name: OTEL_SAMPLE_RATE
    value: "${{ values.sampleRate }}"
  - name: OTEL_BATCH_SIZE
    value: "512"
  - name: OTEL_SERVICE_NAME
    value: "${{ values.serviceName }}"
  - name: PROFILING_ENABLED
    value: "false"
  - name: PYROSCOPE_ENDPOINT
    value: "http://pyroscope.monitoring.svc.cluster.local:4040"
  - name: METRICS_ENABLED
    value: "true"
  - name: METRICS_PATH
    value: "/metrics"
  - name: SHUTDOWN_TIMEOUT
    value: "10s"
  - name: READINESS_DRAIN_DELAY
    value: "5s"
  - name: APP_SECRET
    valueFrom:
      secretKeyRef:
        name: ${{ values.serviceName }}-secrets
        key: app-secret
