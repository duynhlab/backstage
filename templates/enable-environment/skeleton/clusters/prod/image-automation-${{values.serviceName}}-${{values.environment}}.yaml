# Per-service image scan + policy for ${{ values.serviceName }} in ${{ values.environment }}.
# The policy matches the semver tag this environment tracks (beta → plain
# X.Y.Z, prod-us → us-X.Y.Z, prod-eu → eu-X.Y.Z); the env-wide
# ImageUpdateAutomation rewrites the marked tag and opens a reviewed PR.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: ${{ values.serviceName }}-${{ values.environment }}
  namespace: flux-system
spec:
  image: ghcr.io/duynhlab/${{ values.serviceName }}-service/${{ values.serviceName }}-service
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: ${{ values.serviceName }}-${{ values.environment }}
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: ${{ values.serviceName }}-${{ values.environment }}
  filterTags:
    pattern: ${{ values.tagPattern | dump }}
    extract: '$version'
  policy:
    semver:
      range: '>=0.1.0'
