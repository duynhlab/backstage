apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: update-service
  title: Update / Promote Service
  description: |
    Change a service's image tag, replicas or log level in one environment.
    Opens a pull request to the gitops repo — DevOps/SRE review and merge,
    Flux rolls out the change. Promoting to uat/prod is this same template
    pointed at the higher environment with a tag that ran in the lower one.
  tags:
    - gitops
    - flux
    - deploy
    - promote
spec:
  owner: platform-team
  type: deployment

  parameters:
    - title: Target
      required:
        - serviceRef
        - environment
      properties:
        serviceRef:
          title: Service
          type: string
          description: Pick the service to update
          # Tight pattern — the name feeds file paths in the gitops PR
          pattern: '^component:default/[a-z0-9]([a-z0-9-]{0,28}[a-z0-9])?$'
          ui:field: EntityPicker
          ui:options:
            allowArbitraryValues: false
            catalogFilter:
              kind: Component
              spec.type: service
            defaultKind: Component
        environment:
          title: Environment
          type: string
          description: dev is normally CI-managed — use uat/prod for promotions
          enum:
            - dev
            - uat
            - prod
          default: uat

    - title: Desired state
      description: |
        This form is the full desired state for the environment — it replaces
        the current release-patch.yaml, so set every field to what you want.
      required:
        - imageTag
        - replicas
        - logLevel
      properties:
        imageTag:
          title: Image tag
          type: string
          description: Immutable tag from CI (e.g. sha-abc1234 or 1.2.3)
          pattern: '^[a-zA-Z0-9][a-zA-Z0-9._-]{0,127}$'
          ui:autofocus: true
        replicas:
          title: Replicas
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        logLevel:
          title: LOG_LEVEL
          type: string
          enum:
            - debug
            - info
            - warn
            - error
          default: info

  steps:
    - id: fetch
      name: Render updated release patch
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: .
        values:
          serviceName: ${{ parameters.serviceRef | parseEntityRef | pick('name') }}
          environment: ${{ parameters.environment }}
          appEnv: ${{ 'development' if parameters.environment == 'dev' else ('staging' if parameters.environment == 'uat' else 'production') }}
          ciManaged: ${{ parameters.environment == 'dev' }}
          sampleRate: ${{ '1.0' if parameters.environment == 'dev' else ('0.5' if parameters.environment == 'uat' else '0.1') }}
          imageTag: ${{ parameters.imageTag }}
          replicas: ${{ parameters.replicas }}
          logLevel: ${{ parameters.logLevel }}

    - id: pr
      name: Open pull request to gitops
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=duynhlab&repo=gitops
        branchName: update-${{ parameters.serviceRef | parseEntityRef | pick('name') }}-${{ parameters.environment }}
        title: 'Update ${{ parameters.serviceRef | parseEntityRef | pick("name") }} ${{ parameters.environment }} to ${{ parameters.imageTag }}'
        update: true
        description: |
          ## Update `${{ parameters.serviceRef | parseEntityRef | pick('name') }}` — environment `${{ parameters.environment }}`

          Created from the Backstage **Update / Promote Service** template.

          | Setting | Value |
          |---------|-------|
          | Image tag | `${{ parameters.imageTag }}` |
          | Replicas | `${{ parameters.replicas }}` |
          | LOG_LEVEL | `${{ parameters.logLevel }}` |

          Touches only `apps/${{ parameters.environment }}/${{ parameters.serviceRef | parseEntityRef | pick('name') }}/release-patch.yaml`.
          After merge, Flux rolls out the change within ~1 minute.

  output:
    links:
      - title: Pull Request (needs DevOps/SRE approval)
        url: ${{ steps['pr'].output.remoteUrl }}
      - title: Service in catalog
        entityRef: ${{ parameters.serviceRef }}
