apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: onboard-service
  title: Onboard New Service
  description: |
    Self-service onboarding: adds a service to the gitops repo across all
    three environments (dev / uat / prod) via one pull request. DevOps/SRE
    review and merge — Flux deploys it and the service appears in the catalog.
  tags:
    - gitops
    - flux
    - onboarding
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Service details
      required:
        - serviceName
      properties:
        serviceName:
          title: Service name
          type: string
          pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'
          maxLength: 30
          description: Lowercase DNS-safe name (e.g. "payment"). Namespaces become <name>-dev/uat/prod.
          ui:autofocus: true
        description:
          title: Description
          type: string
          maxLength: 200
          default: A duynhlab platform service
        owner:
          title: Owner
          type: string
          description: Team that owns this service
          pattern: '^([a-zA-Z0-9-]+:)?([a-zA-Z0-9-]+/)?[a-zA-Z0-9-]{1,63}$'
          default: platform-team
          ui:field: OwnerPicker
          ui:options:
            allowArbitraryValues: false
            catalogFilter:
              kind: Group

    - title: Image
      required:
        - imageTag
      properties:
        imageRepository:
          title: Image repository
          type: string
          description: Leave empty for the org convention ghcr.io/duynhlab/<name>-service/<name>-service
          pattern: '^$|^[a-z0-9]+([._/-][a-z0-9]+)*$'
          maxLength: 200
          default: ''
        imageTag:
          title: Initial image tag
          type: string
          description: Immutable tag from CI (e.g. sha-abc1234 or 1.2.3)
          pattern: '^[a-zA-Z0-9][a-zA-Z0-9._-]{0,127}$'

    - title: Replicas per environment
      properties:
        replicasDev:
          title: dev replicas
          type: integer
          default: 1
          minimum: 1
          maximum: 5
        replicasUat:
          title: uat replicas
          type: integer
          default: 2
          minimum: 1
          maximum: 5
        replicasProd:
          title: prod replicas
          type: integer
          default: 2
          minimum: 1
          maximum: 10

  steps:
    - id: fetch
      name: Render GitOps manifests (base + dev/uat/prod + catalog)
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: .
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          imageRepository: ${{ parameters.imageRepository or ('ghcr.io/duynhlab/' + parameters.serviceName + '-service/' + parameters.serviceName + '-service') }}
          imageTag: ${{ parameters.imageTag }}
          replicasDev: ${{ parameters.replicasDev }}
          replicasUat: ${{ parameters.replicasUat }}
          replicasProd: ${{ parameters.replicasProd }}

    - id: pr
      name: Open pull request to gitops
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=duynhlab&repo=gitops
        branchName: onboard-${{ parameters.serviceName }}
        title: 'Onboard service ${{ parameters.serviceName }}'
        update: true
        description: |
          ## Onboard `${{ parameters.serviceName }}`

          Created from the Backstage **Onboard New Service** template.

          | Setting | Value |
          |---------|-------|
          | Image | `${{ parameters.imageRepository or ('ghcr.io/duynhlab/' + parameters.serviceName + '-service/' + parameters.serviceName + '-service') }}:${{ parameters.imageTag }}` |
          | Replicas | dev=${{ parameters.replicasDev }}, uat=${{ parameters.replicasUat }}, prod=${{ parameters.replicasProd }} |
          | Owner | `${{ parameters.owner }}` |

          Adds `apps/base/${{ parameters.serviceName }}`, the three environment
          overlays and `catalog/${{ parameters.serviceName }}.yaml`. After merge,
          Flux deploys all three environments and the service appears in the
          Backstage catalog automatically.

  output:
    links:
      - title: Pull Request (needs DevOps/SRE approval)
        url: ${{ steps['pr'].output.remoteUrl }}
    text:
      - title: Next steps
        content: |
          1. DevOps/SRE review and merge the PR
          2. Flux deploys into `${{ parameters.serviceName }}-dev/uat/prod`
          3. The service appears in the Backstage catalog within a few minutes
