apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: onboard-service
  title: Onboard New Service
  description: |
    Bring a service onto the platform in the staging environment via one pull
    request to the gitops repo: base + staging Helm values, HelmRelease,
    per-service SecretStore + ExternalSecret, staging image automation, a
    service-registry entry and the Backstage catalog entity. staging-only PRs
    merge without a required review; promote to higher environments later with
    "Enable Environment".
  tags:
    - gitops
    - flux
    - onboarding
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Service details
      required:
        - serviceName
      properties:
        serviceName:
          title: Service name
          type: string
          pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'
          maxLength: 30
          description: Lowercase DNS-safe name (e.g. "payment"). Staging namespace is <name>-staging.
          ui:autofocus: true
        description:
          title: Description
          type: string
          maxLength: 200
          default: A duynhlab platform service
        owner:
          title: Owner
          type: string
          pattern: '^([a-zA-Z0-9-]+:)?([a-zA-Z0-9-]+/)?[a-zA-Z0-9-]{1,63}$'
          default: platform-team
          ui:field: OwnerPicker
          ui:options:
            allowArbitraryValues: false
            catalogFilter:
              kind: Group

    - title: Image
      required:
        - imageTag
      properties:
        imageRepository:
          title: Image repository
          type: string
          description: Leave empty for the org convention ghcr.io/duynhlab/<name>-service/<name>-service
          pattern: '^$|^[a-z0-9]+([._/-][a-z0-9]+)*$'
          maxLength: 200
          default: ''
        imageTag:
          title: Initial image tag
          type: string
          description: Immutable tag from CI (e.g. sha-abc1234 or 1.2.3)
          pattern: '^[a-zA-Z0-9][a-zA-Z0-9._-]{0,127}$'
        replicas:
          title: Staging replicas
          type: integer
          default: 1
          minimum: 1
          maximum: 5

  steps:
    - id: fetch
      name: Render staging GitOps manifests
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: .
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          imageRepository: ${{ parameters.imageRepository or ('ghcr.io/duynhlab/' + parameters.serviceName + '-service/' + parameters.serviceName + '-service') }}
          imageTag: ${{ parameters.imageTag }}
          replicas: ${{ parameters.replicas }}

    - id: pr
      name: Open pull request to gitops
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=duynhlab&repo=gitops
        branchName: onboard-${{ parameters.serviceName }}
        title: 'Onboard service ${{ parameters.serviceName }} (staging)'
        update: true
        description: |
          ## Onboard `${{ parameters.serviceName }}` to staging

          Created from the Backstage **Onboard New Service** template.

          | Setting | Value |
          |---------|-------|
          | Image | `${{ parameters.imageRepository or ('ghcr.io/duynhlab/' + parameters.serviceName + '-service/' + parameters.serviceName + '-service') }}:${{ parameters.imageTag }}` |
          | Staging replicas | `${{ parameters.replicas }}` |
          | Owner | `${{ parameters.owner }}` |

          Adds `apps/base/${{ parameters.serviceName }}/values-base.yaml`, the
          `apps/staging/${{ parameters.serviceName }}/` overlay (HelmRelease,
          SecretStore, ExternalSecret, values), the staging image automation in
          `clusters/staging/`, `service-registry/${{ parameters.serviceName }}.yaml`
          and `catalog/${{ parameters.serviceName }}.yaml`.

          Staging-only — merges without a required review. Promote to beta /
          prod-us / prod-eu later with **Enable Environment**.

  output:
    links:
      - title: Pull Request
        url: ${{ steps['pr'].output.remoteUrl }}
    text:
      - title: Next steps
        content: |
          1. Merge the PR (staging is unowned — no required review)
          2. Flux on kind-dev deploys into `${{ parameters.serviceName }}-staging`
          3. The service appears in the Backstage catalog within a few minutes
          4. Promote to production regions with the **Enable Environment** template
