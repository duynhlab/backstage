apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.serviceName }}
  description: ${{ values.description | dump }}
  annotations:
    # Kubernetes tab: match workload labels from the mop chart (all environments)
    backstage.io/kubernetes-label-selector: app.kubernetes.io/name=${{ values.serviceName }}
    # Flux tab: match the backstage.io/kubernetes-id label on HelmReleases
    backstage.io/kubernetes-id: ${{ values.serviceName }}
    github.com/project-slug: duynhlab/${{ values.serviceName }}-service
  links:
    - url: https://github.com/duynhlab/${{ values.serviceName }}-service
      title: Source repository
    - url: https://github.com/duynhlab/gitops
      title: GitOps manifests
  tags:
    - go
    - microservice
spec:
  type: service
  lifecycle: production
  owner: ${{ values.owner | dump }}
  system: duynhlab-ecommerce
