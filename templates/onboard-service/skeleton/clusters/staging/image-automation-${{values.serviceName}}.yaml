# Flux image automation for ${{ values.serviceName }} on staging.
# Rewrites the marked image.tag in apps/staging/${{ values.serviceName }}/values-staging.yaml
# and commits to main (staging is the auto-deploy lane). Sorts numerically on
# the monotonic run number in the CI tag form main-<run>-<sha>.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: ${{ values.serviceName }}-staging
  namespace: flux-system
spec:
  image: ${{ values.imageRepository }}
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: ${{ values.serviceName }}-staging
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: ${{ values.serviceName }}-staging
  filterTags:
    pattern: '^main-(?P<ts>[0-9]+)-[a-f0-9]+$'
    extract: '$ts'
  policy:
    numerical:
      order: asc
