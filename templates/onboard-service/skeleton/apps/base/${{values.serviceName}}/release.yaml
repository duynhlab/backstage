# Environment-invariant HelmRelease for ${{ values.serviceName }}. Each
# environment overlay (apps/<env>/${{ values.serviceName }}) sets: namespace,
# replicaCount, image.tag and the full env var list.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${{ values.serviceName }}
  labels:
    backstage.io/kubernetes-id: ${{ values.serviceName }}
spec:
  interval: 5m
  timeout: 5m
  releaseName: ${{ values.serviceName }}
  chartRef:
    kind: OCIRepository
    name: mop-chart-oci
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    name: ${{ values.serviceName }}

    image:
      repository: ${{ values.imageRepository }}
      pullPolicy: IfNotPresent

    service:
      enabled: true
      type: ClusterIP
      http:
        port: 8080
        containerPort: 8080

    resources:
      requests:
        memory: "24Mi"
        cpu: "20m"
      limits:
        memory: "64Mi"
        cpu: "50m"

    livenessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10

    readinessProbe:
      enabled: true
      httpGet:
        path: /ready
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5
