apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrelease.yaml
  - secret-store.yaml
  - externalsecret.yaml
configMapGenerator:
  - name: ${{ values.serviceName }}-values-base
    namespace: ${{ values.serviceName }}-staging
    files:
      - values-base.yaml=../../base/${{ values.serviceName }}/values-base.yaml
  - name: ${{ values.serviceName }}-values-staging
    namespace: ${{ values.serviceName }}-staging
    files:
      - values-staging.yaml
generatorOptions:
  disableNameSuffixHash: true
