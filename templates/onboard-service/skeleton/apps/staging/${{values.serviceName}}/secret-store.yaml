# Per-service SecretStore (ESO fake provider on Kind — static demo value, no
# backend). Real clusters drop this and use a shared ClusterSecretStore → Vault.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: ${{ values.serviceName }}-fake
  namespace: ${{ values.serviceName }}-staging
spec:
  provider:
    fake:
      data:
        - key: ${{ values.serviceName }}/staging/app-secret
          value: "staging-demo-secret-CHANGEME"
