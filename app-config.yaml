app:
  title: duynhlab Developer Platform
  baseUrl: http://localhost:3000

organization:
  name: duynhlab

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

techdocs:
  builder: 'local'
  generator:
    runIn: 'docker'
  publisher:
    type: 'local'

auth:
  providers:
    guest: {}

scaffolder: {}

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, Template, Group, User]
  # Services are discovered from catalog/*.yaml in the gitops repo —
  # onboarding a service through the templates is all it takes to appear here.
  providers:
    github:
      gitops:
        organization: duynhlab
        catalogPath: /catalog/*.yaml
        filters:
          branch: main
          repository: gitops
        schedule:
          frequency: { minutes: 1 }
          timeout: { minutes: 3 }
  locations:
    # -- System --
    - type: file
      target: ../../catalog/systems/ecommerce.yaml
    # -- Organization --
    - type: file
      target: ../../catalog/org/platform-team.yaml
      rules:
        - allow: [User, Group]
    # -- Self-service Templates --
    - type: file
      target: ../../templates/onboard-service/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../templates/update-env-var/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../templates/enable-environment/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../templates/promote-image/template.yaml
      rules:
        - allow: [Template]

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - url: https://kubernetes.default.svc
          name: local
          authProvider: serviceAccount
          skipTLSVerify: true
          skipMetricsLookup: true

permission:
  enabled: true
