name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        run: yarn tsc

      - name: Build backend
        run: yarn build:backend

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          yarn build-image
          docker tag backstage ghcr.io/duynhlab/backstage/backstage:latest
          docker tag backstage ghcr.io/duynhlab/backstage/backstage:${{ github.sha }}
          docker push ghcr.io/duynhlab/backstage/backstage:latest
          docker push ghcr.io/duynhlab/backstage/backstage:${{ github.sha }}
