apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage-agent
  labels:
    app.kubernetes.io/name: backstage-agent
---
# Long-lived token the central Backstage uses to authenticate to this cluster.
apiVersion: v1
kind: Secret
metadata:
  name: backstage-agent-token
  annotations:
    kubernetes.io/service-account.name: backstage-agent
type: kubernetes.io/service-account-token
