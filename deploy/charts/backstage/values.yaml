image:
  repository: backstage
  tag: latest
  # Image is built locally and loaded into Kind, never pulled
  pullPolicy: Never

github:
  # GitHub PAT with repo scope — used by scaffolder to open PRs
  # and by the catalog GitHub provider. Set via helmfile from env.
  token: ""

# GitHub OAuth App for the CI/CD tab (GitHub Actions plugin) — the viewer
# authorizes via popup. Optional: leave disabled until an OAuth App exists.
githubAuth:
  enabled: false
  clientId: ""
  clientSecret: ""

# Environment clusters the Kubernetes/Flux plugins read (backstage-agent
# ServiceAccount tokens). Set via helmfile from env at deploy time.
clusters:
  dev:
    url: ""
    token: ""
  prod:
    url: ""
    token: ""

db:
  # Defaults to backstage-db-rw.<release namespace>.svc.cluster.local
  host: ""
  port: "5432"
  # CNPG auto-generated app credentials secret
  secretName: backstage-db-app

baseUrl: http://localhost:7007

service:
  nodePort: 30007

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
