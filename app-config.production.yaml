app:
  baseUrl: ${APP_BASE_URL}

backend:
  baseUrl: ${BACKEND_BASE_URL}
  listen:
    port: 7007
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
    knexConfig:
      pool:
        min: 2
        max: 10
        acquireTimeoutMillis: 60000
        idleTimeoutMillis: 60000

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

auth:
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true

catalog:
  rules:
    - allow: [Component, System, API, Resource, Location, Template, Group, User]
  # Services are discovered from catalog/*.yaml in the gitops repo —
  # onboarding a service through the templates is all it takes to appear here.
  providers:
    github:
      gitops:
        organization: duynhlab
        catalogPath: /catalog/*.yaml
        filters:
          branch: main
          repository: gitops
        schedule:
          frequency: { minutes: 5 }
          timeout: { minutes: 3 }
  locations:
    - type: file
      target: ./catalog/systems/ecommerce.yaml
    - type: file
      target: ./catalog/org/platform-team.yaml
      rules:
        - allow: [User, Group]
    - type: file
      target: ./templates/onboard-service/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./templates/update-env-var/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./templates/enable-environment/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./templates/promote-image/template.yaml
      rules:
        - allow: [Template]

# Backstage runs on the mgmt cluster; workloads live on the per-environment
# clusters, reached with backstage-agent ServiceAccount tokens (see
# deploy/charts/backstage-agent).
kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - url: ${K8S_DEV_URL}
          name: dev
          authProvider: serviceAccount
          serviceAccountToken: ${K8S_DEV_TOKEN}
          skipTLSVerify: true
          skipMetricsLookup: true
        - url: ${K8S_PROD_URL}
          name: prod
          authProvider: serviceAccount
          serviceAccountToken: ${K8S_PROD_TOKEN}
          skipTLSVerify: true
          skipMetricsLookup: true
