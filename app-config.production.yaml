app:
  baseUrl: ${APP_BASE_URL}

backend:
  baseUrl: ${BACKEND_BASE_URL}
  listen:
    port: 7007
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
    knexConfig:
      pool:
        min: 2
        max: 10
        acquireTimeoutMillis: 60000
        idleTimeoutMillis: 60000

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

auth:
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true

catalog:
  rules:
    - allow: [Component, System, API, Resource, Location, Template, Group, User]
  # Services are discovered from catalog/*.yaml in the gitops repo —
  # onboarding a service through the templates is all it takes to appear here.
  providers:
    github:
      gitops:
        organization: duynhlab
        catalogPath: /catalog/*.yaml
        filters:
          branch: main
          repository: gitops
        schedule:
          frequency: { minutes: 5 }
          timeout: { minutes: 3 }
  locations:
    - type: file
      target: ./catalog/systems/ecommerce.yaml
    - type: file
      target: ./catalog/org/platform-team.yaml
      rules:
        - allow: [User, Group]
    - type: file
      target: ./templates/onboard-service/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./templates/update-service/template.yaml
      rules:
        - allow: [Template]

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - url: https://kubernetes.default.svc
          name: backstage-dev
          authProvider: serviceAccount
          skipTLSVerify: true
          skipMetricsLookup: true
